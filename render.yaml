services:
  - type: worker
    name: telegram-message-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: DELAY_SECONDS
        value: 30
      - key: DAILY_LIMIT
        value: 50
