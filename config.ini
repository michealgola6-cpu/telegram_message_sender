# Telegram Message Sender Configuration
# Modify these values to customize the behavior

[settings]
# Delay between messages in seconds (minimum recommended: 30)
delay_seconds = 30

# Maximum messages per day (recommended: 50)
daily_limit = 50

# Session file name (change if you want multiple accounts)
session_name = message_sender_session

[messages]
# Default message template (optional)
# You can use {name} placeholder for the recipient's first name
default_message = 

[advanced]
# Enable verbose logging (true/false)
verbose = false

# Retry failed messages (true/false)
retry_failed = false

# Maximum retry attempts
max_retries = 3
